name: tests
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: test/run.sh unit

  integration:
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      ALLOW_DESTRUCTIVE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Bootstrap PATH with vendored bork
        run: echo "${{ github.workspace }}/vendor/bork/bin" >> $GITHUB_PATH
      - name: Install coreutils for GNU timeout (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install coreutils
          echo "$(brew --prefix coreutils)/libexec/gnubin" >> $GITHUB_PATH
      - run: test/run.sh integration
